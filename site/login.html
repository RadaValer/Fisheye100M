<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autentificare — Fisheye100M Control Panel</title>
<meta name="description" content="Autentifică-te pentru a accesa panoul de control al flotei Fisheye100M.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%2305080d%22/><circle cx=%2250%22 cy=%2250%22 r=%2230%22 fill=%22none%22 stroke=%22%2322d3ee%22 stroke-width=%224%22/><circle cx=%2250%22 cy=%2250%22 r=%2210%22 fill=%22%2322d3ee%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script>
(function () {
  var stored = localStorage.getItem('fisheye-theme');
  var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme);
  if (localStorage.getItem('fisheye-auth') === 'true') {
    window.location.replace('dashboard.html');
  }
})();
</script>
</head>
<body>

<div class="bg-fx" aria-hidden="true">
  <div class="bubbles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>

<div class="auth-topbar">
  <a href="index.html" class="logo">
    <img class="logo-mark" src="logo.svg" alt="Fisheye100M">
  </a>
  <div class="header-actions">
    <div class="lang-toggle" id="lang-toggle" role="group" aria-label="Limbă / Language">
      <button type="button" class="lang-btn is-active" data-lang="ro">RO</button>
      <button type="button" class="lang-btn" data-lang="en">EN</button>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Comută tema deschis/întunecat" data-i18n-aria="a11y.themeToggle">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"/></svg>
    </button>
  </div>
</div>

<main class="auth-shell">
  <div class="auth-card">
    <div class="auth-icon" aria-hidden="true"><span></span></div>
    <h1 data-i18n="login.title">Autentificare operator</h1>
    <p class="auth-sub" data-i18n="login.subtitle">Accesează panoul de control al flotei Fisheye100M.</p>

    <p class="form-error" id="login-error" hidden data-i18n="login.error">Completează email și parolă pentru a continua.</p>

    <form id="login-form" novalidate>
      <div class="form-field">
        <label for="email" data-i18n="login.emailLabel">Email</label>
        <input class="field-input" type="email" id="email" name="email" placeholder="operator@fisheye100m.dev" autocomplete="username">
      </div>
      <div class="form-field">
        <label for="password" data-i18n="login.passwordLabel">Parolă</label>
        <input class="field-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <label class="field-check">
        <input type="checkbox" id="remember" checked>
        <span data-i18n="login.remember">Ține-mă minte</span>
      </label>
      <button type="submit" class="btn btn-primary" data-i18n="login.submit">Intră în control panel</button>
    </form>

    <p class="form-note" data-i18n="login.demoNote">Acces demonstrativ — completează orice date pentru a continua.</p>
    <p class="form-note"><a class="auth-back" href="index.html" data-i18n="login.back">← Înapoi la site</a></p>
  </div>
</main>

<script src="theme.js"></script>
<script src="i18n.js"></script>
<script src="login.js"></script>
</body>
</html>
